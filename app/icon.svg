<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#060a0f"/>
  <!-- Cyan border glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00d4e8" stroke-width="1.5" opacity="0.6"/>

  <!-- Sword 1 (top-left to bottom-right) -->
  <g transform="rotate(-45, 16, 16)">
    <!-- Blade -->
    <rect x="15.2" y="4" width="1.6" height="16" rx="0.8" fill="#00d4e8"/>
    <!-- Guard -->
    <rect x="11" y="18.5" width="10" height="1.8" rx="0.9" fill="#00d4e8"/>
    <!-- Handle -->
    <rect x="15.2" y="20.5" width="1.6" height="6" rx="0.8" fill="#7a90a8"/>
    <!-- Pommel -->
    <circle cx="16" cy="27.5" r="1.4" fill="#00d4e8"/>
  </g>

  <!-- Sword 2 (top-right to bottom-left) -->
  <g transform="rotate(45, 16, 16)">
    <!-- Blade -->
    <rect x="15.2" y="4" width="1.6" height="16" rx="0.8" fill="#00d4e8" opacity="0.7"/>
    <!-- Guard -->
    <rect x="11" y="18.5" width="10" height="1.8" rx="0.9" fill="#00d4e8" opacity="0.7"/>
    <!-- Handle -->
    <rect x="15.2" y="20.5" width="1.6" height="6" rx="0.8" fill="#7a90a8" opacity="0.7"/>
    <!-- Pommel -->
    <circle cx="16" cy="27.5" r="1.4" fill="#00d4e8" opacity="0.7"/>
  </g>

  <!-- Center glow dot -->
  <circle cx="16" cy="16" r="2" fill="#00d4e8" opacity="0.9"/>
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="#00d4e8" stroke-width="0.5" opacity="0.4"/>
</svg>
